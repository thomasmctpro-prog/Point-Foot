services:
  - type: web
    name: point-foot-backend
    runtime: node
    plan: free
    rootDir: backend
    # Note: no --with-deps here — that flag shells out to `sudo apt-get`, which
    # fails on Render's build sandbox (no root access, "su: Authentication failure").
    # Render's Node build image already ships the shared libs Chromium needs headless.
    # chromium.launch({ headless: true }) resolves to the chrome-headless-shell binary
    # in recent Playwright versions, which is a separate download from "chromium" —
    # install both explicitly or the launch fails with "Executable doesn't exist".
    buildCommand: npm install && npx playwright install chromium chromium-headless-shell && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 24.13.1
      # Render's native (non-Docker) build uploads only the rootDir artifact
      # (app code + node_modules) from the build machine to the runtime instance.
      # Playwright's default browser cache lives in $HOME/.cache/ms-playwright,
      # OUTSIDE that artifact, so browsers installed during build silently vanish
      # at runtime ("Executable doesn't exist" even though the build log shows the
      # download succeeding). PLAYWRIGHT_BROWSERS_PATH=0 stores browsers inside
      # node_modules/.local-browsers instead, which IS part of the shipped artifact.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: PORT
        value: 3001
      - key: FLASHSCORE_BASE_URL
        value: https://www.flashscore.fr
      - key: MERCATO_SOURCE_URL
        value: https://www.footmercato.net/
      - key: SCRAPE_CACHE_TTL_MINUTES
        value: 5
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
